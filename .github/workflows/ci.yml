name: CI
on:
  push:
    branches: [ main, chore/refactor-backend ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install black==23.9.1 isort==5.12.0 mypy==1.10.1
      - name: Check formatting (black)
        run: black --check .
      - name: Check imports order (isort)
        run: isort --check-only .
      - name: Mypy (backend)
        run: mypy backend --ignore-missing-imports
