# fly.toml app configuration file generated for addict-film on 2026-07-13T19:26:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'addict-film'
primary_region = 'fra'

[build]

[env]
  DB_PATH = '/data/movies.db'

# Том потрібен лише у SQLite-режимі (DB_PATH). Якщо в проді заданий DATABASE_URL
# (Postgres/Neon) — том зайвий, але безпечний (просто не використовується).
# Щоб прибрати: `fly volume destroy movies_data` (інтерактивно через flyctl).
[[mounts]]
  source = 'movies_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
