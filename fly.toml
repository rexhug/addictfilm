# Fly.io конфиг публичного Mini App. Перед деплоем замени app на своё уникальное имя.
app = "addict-film"
primary_region = "waw"   # Варшава — ближе к RU/UA; при желании сменить

[build]

[env]
  DB_PATH = "/data/movies.db"

# Постоянный том для SQLite (создать: fly volumes create movies_data --region waw --size 1).
[mounts]
  source = "movies_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1   # SQLite = одна машина, не масштабировать горизонтально

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
