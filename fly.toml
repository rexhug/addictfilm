# Fly.io конфиг публичного Mini App. Перед деплоем замени app на своё уникальное имя.
app = "addict-film"
primary_region = "fra"   # Франкфурт — ближайший доступный к UA

[build]

[env]
  DB_PATH = "/data/movies.db"   # не используется при заданном DATABASE_URL (Postgres/Neon)

# Мигрировано на Postgres (Neon), DATABASE_URL — секрет. Том больше НЕ монтируем на
# новых машинах (каждая новая машина иначе тянет +1 платный том без пользы) — старый
# том с последним SQLite-снапшотом до миграции оставлен вручную как бэкап/откат.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # держим тёплой — сплеск трафика не должен будить машину
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
